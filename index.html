<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit abdhp6 Roblox HTTP Transmitter</title>
    <style>
        body { font-family: monospace; background: #000; color: #00ff00; padding: 20px; font-size: 18px; }
        .input-area { margin-bottom: 20px; }
        input, button { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 8px; font-size: 16px; font-family: monospace; }
        button { cursor: pointer; margin-left: 5px; font-weight: bold; }
        button:hover { background: #00ff00; color: #000; }
        #output { line-height: 1.6; }
        .marker { color: #00ffff; }
        .system-info { color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <div class="input-area">
        <span class="system-info">Target Object: Roblox Build Logic API</span><br><br>
        <input type="text" id="payload" placeholder="Enter text to transmit..." onkeydown="if(event.key === 'Enter') transmit()">
        <button onclick="transmit()">SEND BINARY</button>
    </div>

    <div id="output"></div>

    <script>
        // Структура 8-битного байта abdhp6UR
        const bits = [
            { char: 'a', val: 1 },
            { char: 'b', val: 2 },
            { char: 'd', val: 4 },
            { char: 'h', val: 8 },
            { char: 'p', val: 16 },
            { char: '6', val: 32 },
            { char: 'U', val: 64 },  // UPPERCASE SIGNAL
            { char: 'R', val: 128 }  // RESET SIGNAL
        ];

        let timer = null;

        function to8BitBinary(byteValue) {
            let out = "";
            for (let i = 0; i < bits.length; i++) {
                out += (byteValue & bits[i].val) ? bits[i].char : "0";
            }
            return out;
        }

        // Отправка строгого POST JSON в Roblox API через CORS-шлюз
        function sendHttpPacket(binarySignal, charLabel) {
            // ЗАМЕНИТЕ ЭТУ ССЫЛКУ НА ВАШ URL ROBLOX OPEN CLOUD ИЛИ WEBHOOK
            const robloxApiUrl = 'https://roblox.com';
            
            // Используем CORS-прокси, поддерживающий POST JSON запросы
            const proxyGateway = 'https://herokuapp.com' + robloxApiUrl;

            // Формируем тело запроса, которое Roblox сможет распарсить как JSON
            const payloadData = {
                message: JSON.stringify({
                    signal: binarySignal,
                    char: charLabel
                })
            };

            fetch(proxyGateway, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // Если используете Open Cloud API, раскомментируйте строку ниже и вставьте ключ:
                    // 'x-api-key': 'YOUR_ROBLOX_API_KEY'
                },
                body: JSON.stringify(payloadData)
            })
            .then(res => {
                if (!res.ok) throw new Error(`HTTP error! Status: ${res.status}`);
                return res.text(); // Читаем как текст, чтобы избежать сбоев парсинга при пустом ответе 200 OK
            })
            .then(data => {
                console.log(`[Roblox Sync Success]: ${binarySignal} sent.`);
            })
            .catch(error => {
                console.error('[API Error]: Failed to parse or route packet.', error);
            });
        }

        function transmit() {
            if (timer) clearInterval(timer);

            const input = document.getElementById("payload");
            const text = input.value;
            const output = document.getElementById("output");

            if (!text) return;
            
            input.value = ""; 
            output.innerHTML = ""; 
            
            let queue = [];

            // 1. Сигнал сброса/старта (R = 128)
            queue.push({
                signal: to8BitBinary(128), 
                info: "RESET / NEW MESSAGE"
            });

            // 2. Посимвольный разбор текста
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                let charCode = char.charCodeAt(0);
                let modifiedByte = charCode & 63; 

                const isAlphabet = /[a-zA-Z]/.test(char);
                if (isAlphabet && char === char.toUpperCase()) {
                    modifiedByte |= 64; 
                }

                queue.push({
                    signal: to8BitBinary(modifiedByte),
                    info: `'${char}'`
                });
            }

            let queueIndex = 0;

            timer = setInterval(() => {
                if (queueIndex >= queue.length) {
                    clearInterval(timer);
                    return;
                }

                const currentItem = queue[queueIndex];
                
                if (currentItem.info.includes("RESET")) {
                    output.innerHTML += `<span class="marker">${currentItem.signal} &nbsp;&nbsp; [${currentItem.info}]</span><br>`;
                } else {
                    output.innerHTML += `${currentItem.signal} &nbsp;&nbsp; [${currentItem.info}]<br>`;
                }
                
                sendHttpPacket(currentItem.signal, currentItem.info);

                window.scrollTo(0, document.body.scrollHeight);
                queueIndex++;
            }, 1000);
        }
    </script>
</body>
</html>
